<svg xmlns='http://www.w3.org/2000/svg' width='640' height='160' viewBox='0 0 640 160' fill='none'>
  <!-- Background panel -->
  <rect x='1' y='1' width='638' height='158' rx='6' fill='url(#bgGrad)' stroke='url(#borderGrad)' stroke-width='2' />

  <!-- Chrome top highlight -->
  <path d='M8 6H632' stroke='url(#chromeHL)' stroke-width='1.5' stroke-linecap='round' stroke-opacity='0.7' />

  <!-- Inner frame -->
  <rect x='12' y='12' width='616' height='136' rx='3' fill='url(#innerGrad)' stroke='url(#innerBorder)' stroke-width='1' stroke-opacity='0.6' />

  <!-- Decorative grid lines -->
  <g stroke='rgba(155,77,255,0.12)' stroke-width='0.5'>
    <line x1='12' y1='44' x2='628' y2='44' />
    <line x1='12' y1='116' x2='628' y2='116' />
    <line x1='160' y1='12' x2='160' y2='148' />
    <line x1='480' y1='12' x2='480' y2='148' />
  </g>

  <!-- Left accent strip -->
  <rect x='16' y='20' width='4' height='120' rx='2' fill='url(#accentStrip)' opacity='0.8' />

  <!-- NOVA text -->
  <text x='320' y='95' text-anchor='middle' font-family='Arial Black, Impact, sans-serif' font-size='72' font-weight='900' letter-spacing='0.15em' fill='url(#textGrad)'>
    NOVA
  </text>

  <!-- Text glow layer -->
  <text x='320' y='95' text-anchor='middle' font-family='Arial Black, Impact, sans-serif' font-size='72' font-weight='900' letter-spacing='0.15em' fill='url(#textGrad)' opacity='0.4' filter='url(#glow)'>
    NOVA
  </text>

  <!-- Subtitle -->
  <text x='320' y='130' text-anchor='middle' font-family='Trebuchet MS, Arial, sans-serif' font-size='14' font-weight='700' letter-spacing='0.35em' fill='url(#subtitleGrad)' text-rendering='geometricPrecision'>
    COSMIC EXCHANGE
  </text>

  <!-- Right decorative starburst -->
  <g transform='translate(580,40)' stroke='url(#starGrad)' stroke-width='1' stroke-linecap='round' opacity='0.6'>
    <line x1='0' y1='-12' x2='0' y2='12' />
    <line x1='-12' y1='0' x2='12' y2='0' />
    <line x1='-8' y1='-8' x2='8' y2='8' />
    <line x1='-8' y1='8' x2='8' y2='-8' />
  </g>

  <!-- Bottom rainbow accent line -->
  <path d='M24 142H616' stroke='url(#rainbowLine)' stroke-width='1.5' stroke-linecap='round' stroke-opacity='0.65' />

  <!-- Status dots -->
  <circle cx='32' cy='34' r='3' fill='#FF2D9B' opacity='0.9' />
  <circle cx='44' cy='34' r='3' fill='#9B4DFF' opacity='0.9' />
  <circle cx='56' cy='34' r='3' fill='#00E5FF' opacity='0.9' />

  <defs>
    <filter id='glow'>
      <feGaussianBlur stdDeviation='4' result='blur' />
      <feMerge><feMergeNode in='blur' /><feMergeNode in='SourceGraphic' /></feMerge>
    </filter>

    <linearGradient id='bgGrad' x1='0' y1='0' x2='640' y2='160' gradientUnits='userSpaceOnUse'>
      <stop offset='0' stop-color='#030108' />
      <stop offset='0.5' stop-color='#080318' />
      <stop offset='1' stop-color='#030108' />
    </linearGradient>

    <linearGradient id='borderGrad' x1='0' y1='0' x2='640' y2='160' gradientUnits='userSpaceOnUse'>
      <stop offset='0' stop-color='#FF2D9B' />
      <stop offset='0.25' stop-color='#9B4DFF' />
      <stop offset='0.5' stop-color='#4D88FF' />
      <stop offset='0.75' stop-color='#00E5FF' />
      <stop offset='1' stop-color='#39FF14' />
    </linearGradient>

    <linearGradient id='chromeHL' x1='8' y1='6' x2='632' y2='6' gradientUnits='userSpaceOnUse'>
      <stop offset='0' stop-color='#D0BCFF' stop-opacity='0' />
      <stop offset='0.3' stop-color='#FFFFFF' stop-opacity='0.6' />
      <stop offset='0.7' stop-color='#FFFFFF' stop-opacity='0.6' />
      <stop offset='1' stop-color='#D0BCFF' stop-opacity='0' />
    </linearGradient>

    <linearGradient id='innerGrad' x1='320' y1='12' x2='320' y2='148' gradientUnits='userSpaceOnUse'>
      <stop offset='0' stop-color='#0A0318' />
      <stop offset='1' stop-color='#050210' />
    </linearGradient>

    <linearGradient id='innerBorder' x1='0' y1='12' x2='628' y2='148' gradientUnits='userSpaceOnUse'>
      <stop offset='0' stop-color='#FF2D9B' stop-opacity='0.5' />
      <stop offset='0.5' stop-color='#9B4DFF' stop-opacity='0.3' />
      <stop offset='1' stop-color='#00E5FF' stop-opacity='0.5' />
    </linearGradient>

    <linearGradient id='accentStrip' x1='18' y1='20' x2='18' y2='140' gradientUnits='userSpaceOnUse'>
      <stop offset='0' stop-color='#FF2D9B' />
      <stop offset='0.33' stop-color='#9B4DFF' />
      <stop offset='0.66' stop-color='#00E5FF' />
      <stop offset='1' stop-color='#39FF14' />
    </linearGradient>

    <linearGradient id='textGrad' x1='200' y1='40' x2='440' y2='100' gradientUnits='userSpaceOnUse'>
      <stop offset='0' stop-color='#FF2D9B' />
      <stop offset='0.25' stop-color='#D060FF' />
      <stop offset='0.5' stop-color='#9B4DFF' />
      <stop offset='0.75' stop-color='#4D88FF' />
      <stop offset='1' stop-color='#00E5FF' />
    </linearGradient>

    <linearGradient id='subtitleGrad' x1='220' y1='130' x2='420' y2='130' gradientUnits='userSpaceOnUse'>
      <stop offset='0' stop-color='#D0BCFF' />
      <stop offset='0.5' stop-color='#E8D0FF' />
      <stop offset='1' stop-color='#D0BCFF' />
    </linearGradient>

    <linearGradient id='starGrad' x1='-12' y1='-12' x2='12' y2='12' gradientUnits='userSpaceOnUse'>
      <stop offset='0' stop-color='#FF2D9B' />
      <stop offset='1' stop-color='#00E5FF' />
    </linearGradient>

    <linearGradient id='rainbowLine' x1='24' y1='142' x2='616' y2='142' gradientUnits='userSpaceOnUse'>
      <stop offset='0' stop-color='#FF2D9B' />
      <stop offset='0.2' stop-color='#9B4DFF' />
      <stop offset='0.4' stop-color='#4D88FF' />
      <stop offset='0.6' stop-color='#00E5FF' />
      <stop offset='0.8' stop-color='#39FF14' />
      <stop offset='1' stop-color='#FFD700' />
    </linearGradient>
  </defs>
</svg>
